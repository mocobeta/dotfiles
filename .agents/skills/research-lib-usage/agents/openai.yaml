interface:
  display_name: "Research Library Usage"
  short_description: "Research lib usage with Context7 first"
  default_prompt: "Use $research-lib-usage to research how to use this tool or library with Context7 first and Ollama Search as fallback."
dependencies:
  tools:
    - type: "mcp"
      value: "context7"
      description: "Primary documentation lookup via Context7 MCP"
    - type: "mcp"
      value: "ollama_search"
      description: "Fallback search MCP when Context7 is unavailable or insufficient"
policy:
  allow_implicit_invocation: true
